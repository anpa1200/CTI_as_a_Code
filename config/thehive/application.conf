# TheHive 5 — Application Configuration
# Secrets are injected via environment variables set in docker-compose.yml.
# HOCON substitution: ${VAR} reads from JVM system properties and env vars.

play.http.secret.key = ${SECRET}

# ── Database (JanusGraph with BerkeleyDB for local storage) ──────────────────
db.janusgraph {
  storage {
    backend: berkeleyje
    directory: /data/db
    berkeleyje.freeDisk: 200
  }
  index.search {
    backend: elasticsearch
    hostname: ["elasticsearch"]
    index-name: thehive
    elasticsearch.http.auth.type: basic
    elasticsearch.http.auth.basic.username: elastic
    elasticsearch.http.auth.basic.password: ${ELASTIC_PASSWORD}
  }
}

# ── Attachment Storage (MinIO / S3) ──────────────────────────────────────────
storage {
  provider: s3
  s3 {
    bucket: thehive
    readTimeout: 60000
    writeTimeout: 60000
    chunkSize: 1 MB
    endpoint: "http://minio:9000"
    accessKey: ${MINIO_ROOT_USER}
    secretKey: ${MINIO_ROOT_PASSWORD}
    region: us-east-1
    pathAccessStyle: true
  }
}

