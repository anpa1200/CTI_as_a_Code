input {
  # Filebeat / Winlogbeat / Auditbeat
  beats {
    port => 5044
  }

  # Syslog over UDP (optional: point network devices here)
  udp {
    port => 5140
    codec => plain
    type => "syslog"
  }
}

filter {
  if [type] == "syslog" {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
      }
      add_field => { "received_from" => "%{host}" }
    }
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }

  # Normalise source IP field for SIEM rules
  if [source][ip] {
    mutate {
      copy => { "[source][ip]" => "[client][ip]" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user  => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "cti-lab-logs-%{+YYYY.MM.dd}"
    # ILM: uncomment once you create the policy via setup.sh
    # ilm_rollover_alias => "cti-lab-logs"
    # ilm_pattern        => "{now/d}-000001"
    # ilm_policy         => "cti-lab-logs-policy"
  }
}
