# Cortex 3 — Application Configuration
# Secrets are injected via environment variables set in docker-compose.yml.

play.http.secret.key = ${SECRET}

# ── Elasticsearch Index ───────────────────────────────────────────────────────
search {
  index    = cortex
  uri      = "http://elasticsearch:9200"
  keepalive = 1m
  pagesize  = 50
  nbshards  = 5
  nbreplicas = 0
  # ES 8.x compatibility
  settings {
    mapping.nested_fields.limit = 100
  }
  # Basic auth for ES 8.x with security enabled
  user     = elastic
  password = ${ELASTIC_PASSWORD}
}

# ── Analyzer / Responder Runners ─────────────────────────────────────────────
# Docker runner: Cortex launches analyzer images as containers.
# Requires /var/run/docker.sock mounted in docker-compose.yml.
job {
  runner = [docker, process]
}

docker {
  jobBaseDirectory = /tmp/cortex-jobs
}

# ── HTTP ─────────────────────────────────────────────────────────────────────
play.server.http.port = 9001
play.http.parser.maxMemoryBuffer = 10MB
