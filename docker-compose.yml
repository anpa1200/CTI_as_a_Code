name: cti-lab

# ─────────────────────────────────────────────────────────────────────────────
# CTI Lab — Docker Compose
#
# Services (always up):
#   elasticsearch  — shared data store for all services
#   kibana         — Elastic SIEM UI
#   redis          — OpenCTI cache / pub-sub
#   rabbitmq       — OpenCTI message broker
#   minio          — S3-compatible object store (OpenCTI + TheHive)
#   opencti        — Threat intelligence platform
#   opencti-worker — Background job processors (2 replicas)
#   thehive        — Incident response case management
#   cortex         — Automated enrichment / analyzer runner
#
# Optional profiles:
#   --profile connectors  — start OpenCTI data connectors (MITRE ATT&CK)
#   --profile logstash    — start Logstash log ingestion pipeline
#
# Quick start:
#   cp .env.example .env && nano .env
#   docker compose up -d
#   ./scripts/setup.sh
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Shared Infrastructure ───────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: cti-elasticsearch
    environment:
      - node.name=cti-es01
      - cluster.name=cti-lab
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./config/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - cti-net
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -sf -u "elastic:${ELASTIC_PASSWORD}"
          "http://localhost:9200/_cluster/health"
          | grep -qE '"status":"(green|yellow)"'
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: cti-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - cti-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: cti-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cti-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: cti-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    networks:
      - cti-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── OpenCTI ─────────────────────────────────────────────────────────────────

  opencti:
    image: opencti/platform:6.4.1
    container_name: cti-opencti
    environment:
      - NODE_OPTIONS=--max-old-space-size=8096
      - APP__PORT=8080
      - APP__BASE_URL=http://localhost:8080
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__APP_LOGS__LOGS_LEVEL=error
      - REDIS__HOSTNAME=redis
      - REDIS__PORT=6379
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - ELASTICSEARCH__USERNAME=elastic
      - ELASTICSEARCH__PASSWORD=${ELASTIC_PASSWORD}
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO__SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - APP__SECRET_KEY=${OPENCTI_APP_SECRET}
      - PROVIDERS__LOCAL__STRATEGY=LocalStrategy
    ports:
      - "8080:8080"
    networks:
      - cti-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  opencti-worker:
    image: opencti/worker:6.4.1
    # no container_name — replicas require unique names (auto-generated)
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=error
    deploy:
      mode: replicated
      replicas: 2
    networks:
      - cti-net
    depends_on:
      - opencti
    restart: unless-stopped

  # ── OpenCTI Connectors (profile: connectors) ────────────────────────────────

  connector-mitre:
    image: opencti/connector-mitre:6.4.1
    container_name: cti-connector-mitre
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_MITRE_ID}
      - CONNECTOR_NAME=MITRE ATT&CK
      - CONNECTOR_SCOPE=marking-definition,identity,attack-pattern,course-of-action,intrusion-set,campaign,malware,tool,vulnerability,x-mitre-data-source,x-mitre-data-component,x-mitre-matrix,x-mitre-tactic
      - CONNECTOR_LOG_LEVEL=error
      - CONNECTOR_RUN_AND_TERMINATE=false
      - MITRE_REMOVE_STATEMENT_MARKING=true
      - MITRE_INTERVAL=7
    profiles:
      - connectors
    networks:
      - cti-net
    depends_on:
      - opencti
    restart: unless-stopped

  # ── TheHive + Cortex ────────────────────────────────────────────────────────

  thehive:
    image: strangebee/thehive:5.3.6-1
    container_name: cti-thehive
    environment:
      - JVM_OPTS=-Xms512m -Xmx1g
      - SECRET=${THEHIVE_SECRET}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./config/thehive/application.conf:/etc/thehive/application.conf:ro
      - thehivedata:/data
    ports:
      - "9100:9000"   # TheHive UI
    networks:
      - cti-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  cortex:
    image: thehiveproject/cortex:3.1.8-1
    container_name: cti-cortex
    environment:
      - JVM_OPTS=-Xms512m -Xmx1g
      - SECRET=${CORTEX_SECRET}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./config/cortex/application.conf:/etc/cortex/application.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock  # allows Cortex to run analyzer containers
      - cortexjobs:/tmp/cortex-jobs
    ports:
      - "9002:9001"   # Cortex UI
    networks:
      - cti-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ── Elastic SIEM ────────────────────────────────────────────────────────────

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: cti-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_FLEET_ENABLED=true
    volumes:
      - ./config/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    networks:
      - cti-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: cti-logstash
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./config/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"   # Beats input
      - "9600:9600"   # Logstash API
    profiles:
      - logstash
    networks:
      - cti-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────

networks:
  cti-net:
    driver: bridge

volumes:
  esdata:
  redisdata:
  rabbitmqdata:
  miniodata:
  thehivedata:
  cortexjobs:
