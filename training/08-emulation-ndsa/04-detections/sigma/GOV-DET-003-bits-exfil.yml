title: BITS Job Transfer to Non-Microsoft / Non-Government ASN
id: gov-det-003-bits-exfil
status: production
description: |
  Detects bitsadmin.exe /transfer commands targeting URLs outside Microsoft or
  Israeli government infrastructure. BITS jobs are abused for exfiltration because
  they run under SYSTEM (svchost.exe) and blend with Windows Update traffic.
  Covers T1197 (BITS Jobs) for exfiltration context.
  Note: Only deployed on Windows hosts. GovID 2.0 frontend nodes run Linux —
  this rule does NOT cover Linux-based exfiltration.
author: NDSA Detection Engineering
date: 2024-09-01
tags:
  - attack.defense_evasion
  - attack.t1197
  - attack.exfiltration
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains: '/transfer'
  filter_approved:
    CommandLine|contains:
      - '.microsoft.com'
      - '.windowsupdate.com'
      - '.gov.il'
      - '.incd.gov.il'
      - '.cert.gov.il'
  condition: selection and not filter_approved
falsepositives:
  - Software deployment to non-Microsoft vendor URLs (document in ITSM)
  - Security tooling updates
level: high
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
# DEPLOYMENT: Active on all Windows workstations in GOVNET OPS
# NOT DEPLOYED on GovID 2.0 Linux nodes — Linux equivalent rule needed
# EMULATION RESULT: PASS (see caldera-govid-run.json)
