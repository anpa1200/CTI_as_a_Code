title: Windows Event Log Clearing via wevtutil
id: gov-det-004-wevtutil-log-clear
status: production
description: |
  Detects use of wevtutil.exe to clear Windows event logs (cl subcommand).
  Log clearing is a common adversary anti-forensics technique.
  Known working — tested and confirmed firing within 2 minutes.
  Covers T1070.001 (Indicator Removal — Clear Windows Event Logs).
author: NDSA Detection Engineering
date: 2024-09-01
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\wevtutil.exe'
    CommandLine|contains: ' cl '
  selection_logs:
    CommandLine|contains:
      - 'Security'
      - 'System'
      - 'Application'
      - 'Microsoft-Windows-Sysmon'
  condition: selection and selection_logs
falsepositives:
  - Legitimate maintenance scripts (should be documented in ITSM and run by SYSTEM during maintenance windows)
  - SOC cleanup during incident response (document as exception)
level: high
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
# STATUS: CONFIRMED WORKING — test result: fires within 2 minutes
# EMULATION TARGET: Run wevtutil.exe cl Security in lab
# EXPECTED: PASS
