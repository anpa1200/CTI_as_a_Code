title: LSASS Memory Dump via comsvcs.dll MiniDump
id: gov-det-010-lsass-comsvcs
status: production
description: |
  Detects LSASS memory dumping using comsvcs.dll's MiniDump export function.
  This is one of the most common living-off-the-land credential dumping techniques:
  rundll32.exe C:\Windows\System32\comsvcs.dll, MiniDump [lsass_pid] output.dmp full
  Known issue: high FP rate because backup tools (Veeam, Windows Backup) legitimately
  access LSASS via comsvcs.dll during VSS snapshot operations.
  Covers T1003.001 (OS Credential Dumping — LSASS Memory).
author: NDSA Detection Engineering
date: 2024-09-01
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains|all:
      - 'comsvcs'
      - 'MiniDump'
  filter_backup_tools:
    ParentImage|endswith:
      - '\VeeamAgent.exe'
      - '\wbengine.exe'
      - '\vssvc.exe'
  filter_system_context:
    User: 'NT AUTHORITY\SYSTEM'
    ParentImage|endswith: '\services.exe'
  condition: selection and not (filter_backup_tools or filter_system_context)
falsepositives:
  - Veeam and Windows Backup during VSS operations (covered by filter)
  - Diagnostic tools during troubleshooting (IT admin must document)
  - CrowdStrike and other EDR agents accessing LSASS
level: critical
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
# KNOWN ISSUE: High FP rate in production — Veeam backup runs nightly; triggers rule
# STATUS: Active but alert-fatigued — SOC acknowledges alerts without investigation
# REQUIRED FIX: Improve filter_backup_tools; add Veeam service account to User exclusion
# EMULATION TARGET: rundll32.exe C:\Windows\System32\comsvcs.dll MiniDump [lsass_pid] C:\temp\test.dmp full
# EXPECTED: PASS (should fire within 30s, subject to FP filter)
