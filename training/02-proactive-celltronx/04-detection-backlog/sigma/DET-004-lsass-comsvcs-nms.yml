title: LSASS Memory Access via comsvcs.dll on NMS Hosts
id: d8e9f0a1-2345-6789-bcde-f012345678901
status: test
description: >
  Detects credential dumping via comsvcs.dll MiniDump targeting LSASS process on
  CelltronX Network Management System (NMS) hosts. NMS hosts run with elevated service
  accounts; LSASS compromise yields privileged credentials for NMS configuration access.
  Based on scenario SCN-001 (NetSys contractor → NMS compromise).
author: CelltronX CTI
date: 2024/10/01
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains|all:
      - 'comsvcs.dll'
      - 'MiniDump'
  filter_backup:
    # Exclude known backup product LSASS reads — tune GrantedAccess if available
    ParentImage|endswith:
      - '\veeam\backup\veeamsvc.exe'
      - '\backup\barracudabackup.exe'
  condition: selection and not filter_backup
falsepositives:
  - 'Legitimate backup software that reads LSASS for VSS operations — add specific backup binary to filter'
level: critical
# Deploy priority: P1 — NMS hosts targeted in SCN-001
# Emulation status: Not yet emulated; lab validation pending Sprint 1 deployment
