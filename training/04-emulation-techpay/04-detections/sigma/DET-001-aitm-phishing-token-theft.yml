title: AiTM Phishing — Session Token Reuse from Anomalous Source IP
id: det-001-aitm-token-reuse
status: test
description: |
  Detects post-AiTM phishing session token reuse: a Microsoft 365 authentication
  succeeds from an IP address that differs from the IP that established the original
  OAuth session. This is the primary signal for an AiTM proxy attack where the
  adversary relays stolen session cookies from a different network location.
  Covers T1557 (Adversary-in-the-Middle) and T1078.004 (Valid Accounts — Cloud Accounts).
references:
  - https://attack.mitre.org/techniques/T1557/
  - https://www.microsoft.com/en-us/security/blog/2022/07/12/from-cookie-theft-to-bec/
  - internal://operation-desert-cipher-MR-2024-1147
author: CTI Lab Training
date: 2024-11-01
tags:
  - attack.initial_access
  - attack.t1566.001
  - attack.credential_access
  - attack.t1557
  - attack.t1078.004
logsource:
  category: cloud
  product: azure_ad
  service: signin_logs
detection:
  selection:
    EventName: "Sign-in activity"
    ResultType: "0"  # Success
    AppDisplayName|contains:
      - "Microsoft 365"
      - "Office 365"
      - "SharePoint"
      - "Exchange"
  filter_same_ip:
    IPAddress|equals: PreviousSessionIPAddress  # Same IP as session establishment
  condition: selection and not filter_same_ip
  timeframe: 1h
falsepositives:
  - Legitimate users who authenticate from one location and then move (e.g., office to mobile)
  - VPN users whose exit IP changes between authentication events
  - Users on mobile networks with dynamic IP assignment
level: medium
fields:
  - UserPrincipalName
  - IPAddress
  - Location
  - DeviceDetail
  - ClientAppUsed
  - RiskLevelDuringSignIn
  - ConditionalAccessStatus
# EMULATION NOTE:
# Test: Atomic Red Team T1078.004 — use a stolen session token from a different IP
# Expected signal: Entra ID sign-in log with ResultType=0, IPAddress differs from prior session
# Known limitation: Requires Entra ID sign-in log ingestion into Splunk/Elastic
# Lab gap: Entra ID not connected to lab Elastic SIEM — this rule cannot be tested in lab
# Compensating test: Manual token replay from different IP; verify Entra ID portal alert
