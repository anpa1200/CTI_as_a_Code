title: HKCU Run Key Persistence — Non-Standard Executable Path
id: det-003-hkcu-run-key
status: test
description: |
  Detects writes to HKCU\Software\Microsoft\Windows\CurrentVersion\Run where the
  value points to an executable in a non-standard location (Temp, AppData, ProgramData,
  or Windows system directories not part of standard software install paths).
  UNC-CIPHER/Operation Desert Cipher uses HKCU Run keys specifically because:
  1. Requires no admin rights (unlike HKLM Run keys)
  2. Many detection rules only cover HKLM, missing HKCU entirely
  Covers T1547.001 (Boot/Logon Autostart Execution — Registry Run Keys).
references:
  - https://attack.mitre.org/techniques/T1547/001/
  - internal://operation-desert-cipher-MR-2024-1147
author: CTI Lab Training
date: 2024-11-01
tags:
  - attack.persistence
  - attack.t1547.001
  - attack.privilege_escalation
logsource:
  category: registry_set
  product: windows
detection:
  selection_key:
    TargetObject|startswith:
      - 'HKCU\Software\Microsoft\Windows\CurrentVersion\Run\'
      - 'HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Run\'
  selection_suspicious_path:
    Details|contains:
      - '\Windows\Temp\'
      - '\AppData\Roaming\'
      - '\AppData\Local\Temp\'
      - '\ProgramData\'
      - '\Users\Public\'
  filter_known_good:
    Details|contains:
      - '\Program Files\Microsoft\OneDrive\OneDrive.exe'
      - '\Program Files (x86)\Microsoft\EdgeUpdate\'
      - '\AppData\Local\Microsoft\Teams\current\Teams.exe'
  condition: selection_key and selection_suspicious_path and not filter_known_good
falsepositives:
  - Some legitimate portable applications install to AppData and add Run keys
  - Known-good: Audit and allowlist legitimate HKCU Run key values in your environment
level: high
fields:
  - TargetObject
  - Details
  - Image
  - User
# EMULATION NOTE:
# Atomic Red Team test: T1547.001 — Registry Run Key
# Command: Invoke-AtomicTest T1547.001 -TestNumbers 1
# Expected: Sysmon EID 13 with TargetObject containing HKCU\...\Run\
# Lab result: PARTIAL — rule fires on HKCU but NOT on HKLM variant
# Issue: Lab test used HKLM; rule only covers HKCU.
# Fix needed: Add HKLM variant OR create separate rule for HKLM (lower priority — requires admin)
# Desert Cipher uses HKCU specifically — this rule is correctly scoped for the threat
