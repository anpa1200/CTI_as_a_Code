title: Suspicious Scheduled Task Creation via schtasks.exe
id: det-004-scheduled-task-schtasks
status: test
description: |
  Detects scheduled task creation via schtasks.exe where the task runs a command
  in a suspicious path (/TR points to Temp, AppData, ProgramData, or contains
  known implant filename patterns) and the creator process is not a known-good
  administrative parent (SYSTEM svchost, legitimate installers).
  Operation Desert Cipher uses: schtasks /Create /SC ONLOGON /RU SYSTEM
  to achieve SYSTEM-level persistence from a user-context process.
  Covers T1053.005 (Scheduled Task/Job — Scheduled Task).
references:
  - https://attack.mitre.org/techniques/T1053/005/
  - internal://operation-desert-cipher-MR-2024-1147
author: CTI Lab Training
date: 2024-11-01
tags:
  - attack.persistence
  - attack.t1053.005
  - attack.privilege_escalation
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains|all:
      - '/Create'
      - '/TR'
  selection_suspicious_tr:
    CommandLine|contains:
      - '\Windows\Temp\'
      - '\AppData\'
      - '\ProgramData\'
      - '\Users\Public\'
      - 'svchost32'
      - 'svchosts'
      - 'dsync'
  filter_system_context:
    User|contains:
      - 'SYSTEM'
      - 'LOCAL SERVICE'
      - 'NETWORK SERVICE'
  filter_known_good_parent:
    ParentImage|endswith:
      - '\msiexec.exe'
      - '\setup.exe'
      - '\install.exe'
  condition: selection and selection_suspicious_tr and not (filter_system_context or filter_known_good_parent)
falsepositives:
  - Some legitimate software installs scheduled tasks from AppData paths during user-context installation
  - Known-good: Audit scheduled tasks created in your environment; allowlist by task name + hash
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
# EMULATION NOTE:
# Atomic Red Team test: T1053.005 — Scheduled Task
# Command: Invoke-AtomicTest T1053.005 -TestNumbers 1,4
# Expected: Sysmon EID 1 with schtasks.exe /Create in CommandLine + suspicious /TR path
# Lab result: PASS — rule fires on TestNumber 4 (/TR pointing to %TEMP% path)
# TestNumber 1 uses a legitimate path — not detected (correct behavior)
# Production tuning needed: many software installers will trigger; build allowlist first week
