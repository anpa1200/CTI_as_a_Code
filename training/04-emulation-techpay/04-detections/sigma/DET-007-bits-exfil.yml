title: BITS Job Transfer to Non-Microsoft / Non-Windows-Update Destination
id: det-007-bits-exfil
status: test
description: |
  Detects BITS (Background Intelligent Transfer Service) job creation where the
  remote URL does not resolve to Microsoft-owned infrastructure or known Windows
  Update CDN ASNs. BITS jobs run as SYSTEM under svchost.exe and are commonly
  abused for exfiltration because network monitoring tools see only SYSTEM/svchost
  traffic, masking the true origin process.
  Operation Desert Cipher uses bitsadmin.exe to initiate BITS transfers that
  encode outbound data in the HTTP POST body of a nominally "download" job.
  Covers T1197 (BITS Jobs).
references:
  - https://attack.mitre.org/techniques/T1197/
  - https://www.elastic.co/blog/hunting-for-persistence-using-elastic-security-part-1
  - internal://operation-desert-cipher-MR-2024-1147
author: CTI Lab Training
date: 2024-11-01
tags:
  - attack.defense_evasion
  - attack.t1197
  - attack.persistence
  - attack.exfiltration
  - attack.t1048
logsource:
  category: process_creation
  product: windows
detection:
  selection_bitsadmin:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains: '/transfer'
  filter_microsoft_urls:
    CommandLine|contains:
      - '.microsoft.com'
      - '.windowsupdate.com'
      - '.update.microsoft.com'
      - 'download.visualstudio.microsoft.com'
      - 'go.microsoft.com'
  condition: selection_bitsadmin and not filter_microsoft_urls
falsepositives:
  - Some software deployment tools (SCCM, Intune) use BITS for non-Microsoft URLs
  - Known-good: audit bitsadmin usage in your environment; add legitimate vendor URLs to filter
  - Note: Sysmon Network EID 3 for svchost.exe during BITS transfers will NOT show the true
    initiating process — correlation with EID 1 (bitsadmin.exe) is required
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
# EMULATION NOTE:
# Atomic Red Team test: T1197 — BITS Jobs
# Command: Invoke-AtomicTest T1197 -TestNumbers 1,3
# Expected: Sysmon EID 1 with bitsadmin.exe /transfer in CommandLine
# Lab result: FAIL — rule did NOT fire
# Root cause: Test used PowerShell Start-BitsTransfer (not bitsadmin.exe)
#             Rule only covers bitsadmin.exe; PowerShell BITS cmdlets not covered
# Fix required: Add detection for Start-BitsTransfer (PowerShell module logging EID 4103/4104)
#               OR add Sysmon EID 3 rule for svchost.exe connecting to non-Microsoft IP
#               PREFERRED: Add second detection for PS BITS method
# Priority: HIGH — Desert Cipher uses bitsadmin.exe, but Start-BitsTransfer is also common
