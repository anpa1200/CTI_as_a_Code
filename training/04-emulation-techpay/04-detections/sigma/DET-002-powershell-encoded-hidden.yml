title: PowerShell Encoded Command with Non-Interactive Hidden Window
id: det-002-powershell-enc-hidden
status: test
description: |
  Detects PowerShell execution with -EncodedCommand (or -Enc) combined with
  -NonInteractive (or -NonI) and -WindowStyle Hidden (or -W Hidden).
  This combination is a high-confidence indicator of malicious PowerShell use:
  legitimate automation almost never requires all three flags simultaneously.
  Observed in Operation Desert Cipher initial payload execution.
  Covers T1059.001 (Command and Scripting Interpreter — PowerShell).
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - internal://operation-desert-cipher-MR-2024-1147
author: CTI Lab Training
date: 2024-11-01
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_encoded:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-Enc '
      - '-ec '
  selection_hidden:
    CommandLine|contains:
      - '-WindowStyle Hidden'
      - '-W Hidden'
      - '-WindowStyle H'
      - '-W H'
  selection_noninteractive:
    CommandLine|contains:
      - '-NonInteractive'
      - '-NonI'
      - '-Noni'
      - '-noni'
  condition: selection_image and selection_encoded and selection_hidden and selection_noninteractive
falsepositives:
  - Some legitimate enterprise automation tools (SCCM, Intune) use encoded commands
  - Known-good: Document hash values of legitimate encoded commands in allowlist
  - Reduce FPs by filtering on known-good parent processes (svchost.exe SYSTEM context)
level: high
fields:
  - Image
  - CommandLine
  - ParentImage
  - ParentCommandLine
  - User
  - ProcessId
  - ParentProcessId
# EMULATION NOTE:
# Atomic Red Team test: T1059.001 — PowerShell encoded command
# Command: Invoke-AtomicTest T1059.001 -TestNumbers 1
# Expected: Sysmon EID 1 with CommandLine containing -Enc and -NonI and -W Hidden
# Lab result: PASS — rule fires within 30 seconds of execution
# FP rate in lab: 0 (no legitimate encoded PS in lab environment)
# FP rate in production: Low-Medium (SCCM will trigger; add SCCM service account to allowlist)
