title: DCSync — DS-Replication-Get-Changes from Non-Domain-Controller Account
id: det-006-dcsync-replication
status: test
description: |
  Detects DCSync attacks by monitoring Windows Security EID 4662 for access to
  DS-Replication-Get-Changes and DS-Replication-Get-Changes-All permissions on
  the domain object, from a subject account that is NOT a Domain Controller computer
  account (computer accounts end in $; DCs should be the only non-admin accounts
  performing replication). This is the highest-confidence DCSync detection.
  Covers T1003.006 (OS Credential Dumping — DCSync).
references:
  - https://attack.mitre.org/techniques/T1003/006/
  - https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/dump-password-hashes-from-domain-controller-with-dcsync
  - internal://operation-desert-cipher-MR-2024-1147
author: CTI Lab Training
date: 2024-11-01
tags:
  - attack.credential_access
  - attack.t1003.006
logsource:
  product: windows
  service: security
  definition: Windows Security Event ID 4662
detection:
  selection:
    EventID: 4662
    ObjectServer: DS
    AccessMask: '0x100'
  selection_replication_guid:
    Properties|contains:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'  # DS-Replication-Get-Changes
      - '1131f6ab-9c07-11d1-f79f-00c04fc2dcd2'  # DS-Replication-Get-Changes-All
      - '89e95b76-444d-4c62-991a-0facbeda640c'  # DS-Replication-Get-Changes-In-Filtered-Set
  filter_dc_accounts:
    SubjectUserName|endswith: '$'  # Computer accounts (DCs)
  filter_msol:
    SubjectUserName|startswith: 'MSOL_'  # Azure AD Connect sync account
  condition: selection and selection_replication_guid and not (filter_dc_accounts or filter_msol)
falsepositives:
  - Azure AD Connect (MSOL_ account) performs legitimate replication — covered by filter
  - ADFS service accounts may perform limited replication
  - Quest/Dell migration tools during AD migration projects
  - VERY LOW false positive rate in practice — treat all non-filtered alerts as high priority
level: critical
fields:
  - SubjectUserName
  - SubjectDomainName
  - SubjectLogonId
  - ObjectName
  - Properties
  - IpAddress
# EMULATION NOTE:
# Atomic Red Team test: T1003.006 — DCSync
# Command: Invoke-AtomicTest T1003.006 -TestNumbers 1
# Prerequisites: mimikatz must be installed in lab; domain must be running
# Expected: Windows Security EID 4662 with Properties containing both replication GUIDs
# Lab result: PASS — rule fires within 5 seconds of Mimikatz dcsync execution
# Confirmed working in lab Elastic SIEM: query index=winlogbeat EventID:4662
# Note: Requires Windows Security event forwarding to SIEM; verify before claiming coverage
